<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beelz's Map Generator — Dungeon Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=IM+Fell+English:ital@0;1&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment: #ede3c8;
    --parchment-dark: #e2d4ad;
    --ink: #2b2418;
    --ink-soft: #4a3f2c;
    --copper: #a8632f;
    --copper-dark: #7c4720;
    --wash-blue: #4a5d6b;
    --wall-umber: #5c4424;
    --danger: #7a2e1f;
    --paper-shadow: rgba(43,36,24,0.35);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0;
    background: #1c1712;
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    min-height:100vh;
  }

  body{
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.03), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(255,255,255,0.02), transparent 60%);
    padding: clamp(16px, 4vw, 40px);
  }

  .page-title{
    text-align:center;
    color: var(--parchment-dark);
    font-family: 'Cormorant SC', serif;
    font-weight:700;
    letter-spacing: 0.12em;
    font-size: clamp(22px, 3vw, 34px);
    margin: 0 0 4px 0;
    text-transform: uppercase;
  }
  .page-sub{
    text-align:center;
    color: #9a8a6c;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 16px;
    margin: 0 0 28px 0;
    letter-spacing: 0.02em;
  }

  .layout{
    max-width: 1320px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 22px;
    align-items: start;
  }

  @media (max-width: 880px){
    .layout{ grid-template-columns: 1fr; }
  }

  /* ---------- Ledger panel ---------- */
  .ledger{
    background: var(--parchment);
    border-radius: 3px;
    padding: 26px 24px 24px;
    position: relative;
    box-shadow: 0 18px 40px var(--paper-shadow), 0 2px 0 rgba(255,255,255,0.4) inset;
    border: 1px solid #c9b988;
  }
  .ledger::before{
    content:"";
    position:absolute; inset: 8px;
    border: 1px solid var(--copper);
    opacity: 0.45;
    pointer-events:none;
  }
  .ledger-head{
    font-family:'Cormorant SC', serif;
    font-weight:700;
    font-size: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    border-bottom: 2px solid var(--ink);
    padding-bottom: 10px;
    margin-bottom: 18px;
  }

  .field{ margin-bottom: 18px; }
  .field label{
    display:flex;
    justify-content: space-between;
    align-items:baseline;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .field label .val{
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    color: var(--copper-dark);
    font-weight:700;
  }

  select, input[type="text"]{
    width:100%;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    padding: 7px 10px;
    background: #f6f0dc;
    border: 1px solid #b8a679;
    border-radius: 2px;
    color: var(--ink);
  }
  select:focus, input[type="text"]:focus{
    outline: 2px solid var(--copper);
    outline-offset: 1px;
  }

  input[type="range"]{
    width:100%;
    accent-color: var(--copper-dark);
    background: transparent;
  }

  .toggle-row{
    display:flex;
    align-items:center;
    justify-content: space-between;
    font-size: 16px;
    font-weight:600;
    color: var(--ink-soft);
  }
  .toggle-row input{ accent-color: var(--copper-dark); width:18px; height:18px; }

  .seal-btn{
    width:100%;
    margin-top: 6px;
    padding: 13px 10px;
    background: linear-gradient(180deg, var(--copper) 0%, var(--copper-dark) 100%);
    color: #f6e9d4;
    border: 1px solid #5e3414;
    border-radius: 3px;
    font-family: 'Cormorant SC', serif;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 4px 0 #4d2c12, 0 6px 10px rgba(0,0,0,0.35);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .seal-btn:hover{ filter: brightness(1.05); }
  .seal-btn:active{
    transform: translateY(3px);
    box-shadow: 0 1px 0 #4d2c12, 0 2px 4px rgba(0,0,0,0.3);
  }

  .secondary-row{
    display:flex;
    gap: 10px;
    margin-top: 10px;
  }
  .ghost-btn{
    flex:1;
    padding: 9px 8px;
    background: transparent;
    border: 1px solid var(--ink-soft);
    color: var(--ink-soft);
    font-family: 'Cormorant Garamond', serif;
    font-weight:600;
    font-size: 14px;
    border-radius: 2px;
    cursor:pointer;
    letter-spacing: 0.03em;
  }
  .ghost-btn:hover{ background: rgba(43,36,24,0.06); }

  .legend{
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px dashed #b8a679;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .legend-row{ display:flex; align-items:center; gap:8px; margin-bottom: 6px; }
  .legend-swatch{ width:14px; height:14px; flex:none; border:1px solid var(--ink); }

  .seed-line{
    margin-top: 16px;
    font-family:'Courier Prime', monospace;
    font-size: 12.5px;
    color: #7a6d50;
    text-align:center;
    letter-spacing: 0.02em;
  }

  .subhead{
    margin: 22px 0 16px;
    padding-top: 16px;
    border-top: 1px dashed #b8a679;
    font-family: 'Cormorant SC', serif;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-size: 14px;
    color: var(--ink);
  }

  /* ---------- Map stage ---------- */
  .stage-wrap{
    background: #110d09;
    border-radius: 4px;
    padding: clamp(10px, 2vw, 26px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.55);
    position: relative;
  }
  .stage-inner{
    position: relative;
    background: var(--parchment);
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 0 0 1px #c9b988, 0 30px 60px rgba(0,0,0,0.4) inset;
  }
  .stage-inner::after{
    content:"";
    position:absolute; inset:0;
    pointer-events:none;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(43,36,24,0.18) 100%);
  }
  #mapCanvas{
    display:block;
    width:100%;
    height:auto;
  }

  .stage-caption{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding: 10px 4px 0;
    color: #9a8a6c;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 14px;
  }
  .stage-caption .room-count{
    font-family:'Courier Prime', monospace;
    font-style: normal;
    color: #b59b6b;
    font-size: 12.5px;
  }

  .roster{
    margin-top: 14px;
    background: var(--parchment);
    border: 1px solid #c9b988;
    border-radius: 2px;
    padding: 14px 18px;
    box-shadow: 0 8px 20px var(--paper-shadow);
  }
  .roster-head{
    font-family: 'Cormorant SC', serif;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 14px;
    color: var(--ink);
    border-bottom: 1px solid var(--ink);
    padding-bottom: 8px;
    margin-bottom: 10px;
  }
  .roster-empty{
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: #8a7a5c;
    font-size: 14.5px;
  }
  .roster-list{
    display:flex;
    flex-direction: column;
    gap: 2px;
  }
  .roster-row{
    display:flex;
    align-items: flex-start;
    gap: 4px 10px;
    font-size: 15px;
    color: var(--ink-soft);
    padding: 7px 0;
    border-bottom: 1px dotted rgba(92,68,36,0.25);
  }
  .roster-room{
    font-family:'Courier Prime', monospace;
    font-size: 12px;
    color: var(--copper-dark);
    font-weight: 700;
    flex: none;
    width: 44px;
    padding-top: 2px;
  }
  .roster-name{ flex:1; min-width: 200px; }
  .roster-line{ margin-bottom: 6px; }
  .roster-line:last-child{ margin-bottom: 0; }
  .roster-sub{
    font-family:'Courier Prime', monospace;
    font-size: 12.5px;
    color: #7a6d50;
  }
  .roster-tag{
    display:inline-block;
    font-family:'Cormorant SC', serif;
    font-size: 11px;
    font-weight:700;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color: #f6e9d4;
    padding: 1px 7px;
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .roster-tag-trap{ background: var(--danger); }
  .roster-tag-hazard{ background: var(--wash-blue); }
  .roster-desc{
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--ink-soft);
    margin-top: 3px;
    line-height: 1.45;
  }

  @media (prefers-reduced-motion: no-preference){
    .seal-btn, .ghost-btn{ transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s ease; }
  }
</style>
</head>
<body>

<h1 class="page-title">The Beelz's Map Generator</h1>
<p class="page-sub">— a tool for drawing dungeons that have never been walked —</p>

<div class="layout">

  <!-- CONTROL PANEL -->
  <div class="ledger">
    <div class="ledger-head">Parameters</div>

    <div class="field">
      <label for="roomsRange">Chambers <span class="val" id="roomsVal">12</span></label>
      <input type="range" id="roomsRange" min="4" max="40" value="12">
    </div>

    <div class="field">
      <label for="sizeRange">Chamber Scale <span class="val" id="sizeVal">Medium</span></label>
      <input type="range" id="sizeRange" min="1" max="3" value="2">
    </div>

    <div class="field">
      <label for="windRange">Corridor Windiness <span class="val" id="windVal">0</span></label>
      <input type="range" id="windRange" min="0" max="6" value="0">
    </div>

    <div class="field">
      <label for="loopRange">Loop Density <span class="val" id="loopVal">0</span></label>
      <input type="range" id="loopRange" min="0" max="6" value="0">
    </div>

    <div class="field">
      <label for="trapFreqRange">Trap Frequency <span class="val" id="trapFreqVal">3</span></label>
      <input type="range" id="trapFreqRange" min="0" max="9" value="3">
    </div>

    <div class="subhead">Difficulty</div>

    <div class="field">
      <label for="crMinRange">Minimum CR <span class="val" id="crMinVal">0</span></label>
      <input type="range" id="crMinRange" min="0" max="1" value="0">
    </div>

    <div class="field">
      <label for="crMaxRange">Maximum CR <span class="val" id="crMaxVal">3</span></label>
      <input type="range" id="crMaxRange" min="0" max="1" value="1">
    </div>

    <div class="field">
      <label for="monsterFreqRange">Monster Frequency <span class="val" id="monsterFreqVal">3</span></label>
      <input type="range" id="monsterFreqRange" min="0" max="9" value="3">
    </div>

    <div class="subhead">Loot</div>

    <div class="field">
      <label for="rarityMinRange">Minimum Rarity <span class="val" id="rarityMinVal">Common</span></label>
      <input type="range" id="rarityMinRange" min="0" max="5" value="0">
    </div>

    <div class="field">
      <label for="rarityMaxRange">Maximum Rarity <span class="val" id="rarityMaxVal">Rare</span></label>
      <input type="range" id="rarityMaxRange" min="0" max="5" value="2">
    </div>

    <div class="field">
      <label for="itemFreqRange">Item Frequency <span class="val" id="itemFreqVal">2</span></label>
      <input type="range" id="itemFreqRange" min="0" max="9" value="2">
    </div>

    <div class="field" style="margin-bottom:8px;">
      <label for="seedInput">Survey Seed</label>
      <input type="text" id="seedInput" placeholder="leave blank for random">
    </div>

    <button class="seal-btn" id="generateBtn">⚜ Chart a New Dungeon</button>
    <div class="secondary-row">
      <button class="ghost-btn" id="downloadBtn">Export as Image</button>
      <button class="ghost-btn" id="printBtn">Print</button>
    </div>

    <div class="legend">
      <div class="legend-row"><span class="legend-swatch" style="background:#5c4424;"></span> Wall</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#7a4a26;"></span> Door</div>
      <div class="legend-row"><span style="font-size:16px;line-height:1;width:14px;text-align:center;flex:none;">&#x1FA9C;</span> Entrance (ladder up)</div>
      <div class="legend-row"><span style="font-size:16px;line-height:1;width:14px;text-align:center;flex:none;">&#x1F573;&#xFE0F;</span> Exit (ladder down)</div>
    </div>

    <div class="seed-line" id="seedLine">seed: —</div>
  </div>

  <!-- MAP STAGE -->
  <div class="stage-wrap">
    <div class="stage-inner">
      <canvas id="mapCanvas" width="1000" height="760"></canvas>
    </div>
    <div class="stage-caption">
      <span id="dungeonName">Untitled Survey</span>
      <span class="room-count" id="roomCountLabel">0 chambers</span>
    </div>
    <div class="roster" id="roster"></div>
  </div>

</div>

<script>
(function(){
  const canvas = document.getElementById('mapCanvas');
  const ctx = canvas.getContext('2d');

  // ---------- seeded RNG (mulberry32) ----------
  function hashSeed(str){
    let h = 1779033703 ^ str.length;
    for (let i=0;i<str.length;i++){
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function(){
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      h ^= h >>> 16;
      return h >>> 0;
    };
  }
  function mulberry32(a){
    return function(){
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  let rand = Math.random;
  function setSeed(seedStr){
    if (!seedStr){
      seedStr = Math.floor(Math.random()*1e9).toString(36);
    }
    const seeder = hashSeed(seedStr);
    rand = mulberry32(seeder());
    return seedStr;
  }
  function ri(min, max){ return Math.floor(rand()*(max-min+1))+min; }
  function choice(arr){ return arr[Math.floor(rand()*arr.length)]; }

  // ---------- name generation ----------
  const NAME_PARTS = {
    a: ["Forsaken","Crumbling","Sunless","Weeping","Hollow","Gnashing","Coiled","Feral","Bramble",
        "Bonechew","Silent","Drowned","Forgotten","Ashen","Pale","Ironbound","Deepforge","Granite",
        "Stonewrought","Anvilgrim","Whispering","Veiled","Blackcandle","Starless","Thricebound"],
    b: ["Hold","Spire","Wreck","Vault","Ruins","Den","Warren","Burrow","Maw","Hollow","Crypt",
        "Catacomb","Tomb","Sepulcher","Ossuary","Bastion","Stronghold","Keep","Delve","Shrine",
        "Sanctum","Conclave"]
  };
  function generateName(){
    return `The ${choice(NAME_PARTS.a)} ${choice(NAME_PARTS.b)}`;
  }

  // ---------- map theme ----------
  // Dungeon Character (the old style picker) has been removed, so the map
  // now always uses this one fixed palette/wall treatment.
  const THEME = {
    wallColor: '#4a3322',
    roomFill: '#f0e8d2',
    roomFillHeart: '#e8dcb8',
    corridorFill: '#d3bd87',
    jitter: 2.0,
    corridorWidthCells: 1,
    hazardChance: 0.10,
    trapChance: 0.16
  };

  function formatCR(cr){
    if (Number.isInteger(cr)) return String(cr);
    // every CR in the bestiary (and any sum of them) lands on an eighth
    const eighths = Math.round(cr * 8);
    const whole = Math.floor(eighths / 8);
    let num = eighths % 8, den = 8;
    while (num % 2 === 0 && den % 2 === 0){ num /= 2; den /= 2; }
    return whole > 0 ? `${whole} ${num}/${den}` : `${num}/${den}`;
  }

    { name: 'Grasping Floor Tentacles', type: 'Strength', damageType: 'bludgeoning', desc: 'Dark, rubbery tendrils erupt from cracks in the floorboards to drag victims down.', extraEffect: ' and be restrained' },
    { name: 'Drowning Water Cell', type: 'Strength', damageType: 'suffocation', desc: 'Iron portcullises drop instantly to lock targets inside a small chamber while rushing water floods it to the ceiling.' },
    { name: 'Quicksand Pit', type: 'Strength', damageType: 'buried', desc: 'A section of the floor consists of deep, enchanted sand that liquefies under weight, pulling victims down into the earth.' },
    { name: 'Blinding Light Flash', type: 'Constitution', damageType: 'radiant', desc: 'A celestial rune flashes with the intensity of a dying star, scorching the retinas of anyone facing its direction.' },
    { name: 'Teleportation Vortex', type: 'Wisdom', damageType: 'force', desc: 'An unstable rift opens up, pulling travelers into a swirling vortex of planar energy and dropping them from a great height.' }
  ];

  const TRAP_DATA = [];
  for (let cr = 1; cr <= 30; cr++) {
    let dc = 10 + Math.floor(cr / 2);
    if (dc < 11) dc = 11;
    if (dc > 22) dc = 22;

    let d6Count = Math.max(1, Math.floor(cr * 1.5));
    let d10Count = Math.max(1, Math.floor(cr * 0.9));

    BASE_TRAPS.forEach(t => {
      let isD10 = ['bludgeoning', 'fire', 'force', 'acid'].includes(t.damageType);
      let damageStr = isD10 ? `${d10Count}d10` : `${d6Count}d6`;
      let extra = t.extraEffect || '';
      
      let specializedDesc = `${t.desc} A creature must succeed on a DC ${dc} ${t.type} saving throw or take ${damageStr} ${t.damageType} damage${extra} on a failure, or half as much on a successful save.`;
      if (t.damageType === 'suffocation' || t.damageType === 'buried') {
        specializedDesc = `${t.desc} A creature must succeed on a DC ${dc} ${t.type} check or become trapped, taking ${damageStr} bludgeoning damage every round until they break free.`;
      }
      
      TRAP_DATA.push([
        `${t.name} (CR ${cr})`,
        cr,
        specializedDesc
      ]);
    });
  }

  const HAZARD_DATA=[
  ['Burning',1,'A creature or object that has caught fire takes 1d4 fire damage at the start of each of its turns. Dropping prone and rolling on the ground puts the flames out, as does dousing, submerging, or smothering them.'],
  ['Dehydration',0,'A creature that drinks less than half the water it needs in a day gains one level of exhaustion at day\'s end. That exhaustion won\'t go away until the creature drinks a full day\'s worth of water.'],
  ['Falling',3,'A creature that falls takes 1d6 bludgeoning damage for every 10 feet it drops, up to a maximum of 20d6, and lands prone unless it avoided all the damage. A creature that plunges into water or another liquid can use its reaction to attempt a DC 15 Strength (Athletics) or Dexterity (Acrobatics) check to hit the surface cleanly, halving the damage on a success.'],
  ['Malnutrition',0,'A creature that eats less than half the food it needs in a day must succeed on a DC 10 Constitution save or gain a level of exhaustion at day\'s end. Going without food entirely for five days brings on exhaustion automatically, with another level added for every additional day of starvation.'],
  ['Suffocation',2,'A creature can hold its breath for 1 minute plus its Constitution modifier (minimum 30 seconds) before it begins to suffocate. From then on, it gains a level of exhaustion at the end of each turn it can\'t breathe — exhaustion that vanishes the moment it can breathe again.'],
  ['Deep Water',1,'Swimming through water deeper than 100 feet is taxing on body and lungs. A creature without a swim speed must succeed on a DC 10 Constitution save after every hour spent swimming or gain a level of exhaustion.'],
  ['Extreme Cold',1,'In temperatures of 0°F or below, an exposed creature must succeed on a DC 10 Constitution save at the end of every hour or gain a level of exhaustion. Creatures resistant or immune to cold damage automatically succeed.'],
  ['Extreme Heat',1,'In temperatures of 100°F or higher, a creature without drinkable water must succeed on a Constitution save every hour or gain a level of exhaustion; the DC starts at 5 and climbs by 1 each additional hour. Medium or heavy armor imposes disadvantage on the save, while resistance or immunity to fire damage guarantees success.'],
  ['Frigid Water',1,'A creature can endure frigid water for a number of minutes equal to its Constitution score before the cold sets in. Every additional minute submerged calls for a DC 10 Constitution save or another level of exhaustion, though creatures resistant or immune to cold (or naturally built for icy water) are unaffected.'],
  ['Heavy Precipitation',0,'Heavy rain or snowfall lightly obscures the area within it, imposing disadvantage on Wisdom (Perception) checks that rely on sight, and any open flame caught in it is doused.'],
  ['High Altitude',0,'Above 10,000 feet, thin air makes every hour of travel count as two hours against a creature\'s daily travel limit. Creatures that spend 30 or more days at that elevation become acclimated and are no longer affected.'],
  ['Slippery Ice',0,'A patch of slick ice counts as difficult terrain, and any creature that moves onto it for the first time on a turn, or starts its turn there, must succeed on a DC 10 Dexterity save or fall prone.'],
  ['Strong Wind',0,'A strong wind imposes disadvantage on ranged weapon attacks, extinguishes open flames, and disperses fog. A flying creature caught in it must land by the end of its turn or fall, and in the desert such winds can kick up a sandstorm that imposes disadvantage on Perception checks.'],
  ['Thin Ice',1,'A 10-foot square of thin ice can bear only 3d10 × 10 pounds before it gives way. Once that weight is exceeded, the ice in that square shatters and anyone standing on it drops into the frigid water beneath.']
  ];

  // ---------- dungeon model ----------
  // Rooms live on a coarse integer cell grid. The grid (and the canvas
  // itself) is sized per-generation from the requested chamber count and
  // chamber scale, so the layout always has room for every chamber the
  // person asked for instead of silently dropping ones that don't fit a
  // fixed-size canvas.
  const BASE_CELL = 40;     // ideal px per cell
  const MIN_CELL = 16;      // never shrink cells past this (keeps 5ft squares legible)
  const PAD = 90;           // parchment margin around the grid, in px
  const MAX_CANVAS_DIM = 3200; // cap so very dense dungeons stay a sane render size
  const MIN_CANVAS_W = 900; // keep small dungeons from rendering as a tiny stamp
  const MIN_CANVAS_H = 680;

  function sizeGridFor(roomCount, sizeTier){
    const sizeRanges = { 1: [2,3], 2: [3,5], 3: [4,7] };
    const [minDim, maxDim] = sizeRanges[sizeTier];
    const avgDim = (minDim+maxDim)/2;
    const avgRoomArea = avgDim*avgDim;
    // Budget enough cells so rooms (plus corridor space and spacing)
    // comfortably fit even at the densest setting (40 rooms, large scale).
    const targetCells = roomCount * avgRoomArea * 2.6 + 60;
    const aspect = 1000/760; // keep roughly the original canvas aspect
    let cols = Math.ceil(Math.sqrt(targetCells * aspect));
    let rows = Math.ceil(cols / aspect);
    cols = Math.max(cols, maxDim + 6);
    rows = Math.max(rows, maxDim + 6);
    return { cols, rows };
  }

  function layoutForGrid(cols, rows){
    let cell = BASE_CELL;
    let neededW = cols*cell + PAD*2;
    let neededH = rows*cell + PAD*2;
    if (Math.max(neededW, neededH) > MAX_CANVAS_DIM){
      cell = Math.max(MIN_CELL, Math.floor((MAX_CANVAS_DIM - PAD*2) / Math.max(cols, rows)));
      neededW = cols*cell + PAD*2;
      neededH = rows*cell + PAD*2;
    }
    const W = Math.max(neededW, MIN_CANVAS_W);
    const H = Math.max(neededH, MIN_CANVAS_H);
    const offX = (W - cols*cell)/2;
    const offY = (H - rows*cell)/2;
    return { cell, W, H, offX, offY };
  }

  function rectsOverlap(a, b, pad){
    return !(a.x+a.w+pad <= b.x || b.x+b.w+pad <= a.x || a.y+a.h+pad <= b.y || b.y+b.h+pad <= a.y);
  }

  // Rasterize an orthogonal point-path into the set of grid cells the
  // corridor passes through, widened to corridorWidthCells, so corridors
  // render as actual 5ft grid squares rather than a freeform stroked line.
  function widthOffsets(width){
    const offs = [];
    const lead = Math.floor((width-1)/2);
    for (let i=0;i<width;i++) offs.push(i - lead);
    return offs;
  }
  function rasterizeCorridor(path, width, into){
    const offs = widthOffsets(Math.max(1, width));
    for (let i=0;i<path.length-1;i++){
      const p0 = path[i], p1 = path[i+1];
      if (p0.x === p1.x){
        const x = p0.x;
        const y0 = Math.min(p0.y,p1.y), y1 = Math.max(p0.y,p1.y);
        for (let y=y0;y<=y1;y++){
          for (const o of offs) into.add((x+o)+','+y);
        }
      } else if (p0.y === p1.y){
        const y = p0.y;
        const x0 = Math.min(p0.x,p1.x), x1 = Math.max(p0.x,p1.x);
        for (let x=x0;x<=x1;x++){
          for (const o of offs) into.add(x+','+(y+o));
        }
      } else {
        into.add(p0.x+','+p0.y);
        into.add(p1.x+','+p1.y);
      }
    }
  }

  function buildDungeon(opts){
    const { roomCount, sizeTier, windiness, loopiness, crMin, crMax, monsterFrequency, rarityMin, rarityMax, itemFrequency, trapFrequency } = opts;
    const profile = THEME;

    const sizeRanges = { 1: [2,3], 2: [3,5], 3: [4,7] };
    const [minDim, maxDim] = sizeRanges[sizeTier];

    const { cols: COLS, rows: ROWS } = sizeGridFor(roomCount, sizeTier);
    const { cell, W, H, offX, offY } = layoutForGrid(COLS, ROWS);

    // ---- room placement ----
    const rooms = [];
    const cellPad = 1;

    function tryPlaceAt(x, y, w, h){
      if (x < 1 || y < 1 || x+w > COLS-1 || y+h > ROWS-1) return null;
      const candidate = { x, y, w, h };
      for (const r of rooms){
        if (rectsOverlap(candidate, r, cellPad)) return null;
      }
      return candidate;
    }

    let attempts = 0;
    const maxAttempts = roomCount * 400;
    while (rooms.length < roomCount && attempts < maxAttempts){
      attempts++;
      const w = ri(minDim, maxDim);
      const h = ri(minDim, maxDim);
      const x = ri(1, Math.max(1, COLS - w - 1));
      const y = ri(1, Math.max(1, ROWS - h - 1));
      const placed = tryPlaceAt(x, y, w, h);
      if (placed){ placed.id = rooms.length; rooms.push(placed); }
    }

    // Fallback systematic sweep in case random scatter couldn't fit every
    // room at extreme density — keeps the requested count honored whenever
    // it's geometrically possible.
    if (rooms.length < roomCount){
      outer:
      for (let gy = 1; gy < ROWS - minDim; gy += 1){
        for (let gx = 1; gx < COLS - minDim; gx += 1){
          if (rooms.length >= roomCount) break outer;
          const w = ri(minDim, maxDim);
          const h = ri(minDim, maxDim);
          const placed = tryPlaceAt(gx, gy, w, h);
          if (placed){ placed.id = rooms.length; rooms.push(placed); }
        }
      }
    }

    // assign room roles
    rooms.forEach((r, i) => {
      r.cx = r.x + r.w/2;
      r.cy = r.y + r.h/2;
      r.shapeSeed = rand();
      r.role = 'chamber';
      r.number = i + 1;
    });
    if (rooms.length){
      rooms[0].role = 'entrance';
      let biggest = rooms[0];
      for (const r of rooms) if (r.w*r.h > biggest.w*biggest.h) biggest = r;
      biggest.role = 'heart';
      // Assign exit to a room that is not entrance or heart, furthest from entrance
      const entrance = rooms[0];
      let exitRoom = null, maxDist = -1;
      for (const r of rooms){
        if (r.role !== 'chamber') continue;
        const d = Math.hypot(r.cx - entrance.cx, r.cy - entrance.cy);
        if (d > maxDist){ maxDist = d; exitRoom = r; }
      }
      if (exitRoom) exitRoom.role = 'exit';
    }

    // ---- connect rooms: minimum spanning tree via nearest-neighbor (Prim's) ----
    const edges = [];
    if (rooms.length > 1){
      const inTree = new Set([0]);
      const dist = (a,b) => Math.hypot(a.cx-b.cx, a.cy-b.cy);
      while (inTree.size < rooms.length){
        let best = null, bestD = Infinity;
        for (const i of inTree){
          for (let j=0;j<rooms.length;j++){
            if (inTree.has(j)) continue;
            const d = dist(rooms[i], rooms[j]);
            if (d < bestD){ bestD = d; best = [i,j]; }
          }
        }
        if (!best) break;
        edges.push(best);
        inTree.add(best[1]);
      }

      // extra loop connections based on loopiness
      const extra = Math.round(loopiness * (rooms.length/8));
      for (let k=0;k<extra;k++){
        const i = ri(0, rooms.length-1);
        const j = ri(0, rooms.length-1);
        if (i!==j){
          const exists = edges.some(e => (e[0]===i&&e[1]===j)||(e[0]===j&&e[1]===i));
          if (!exists) edges.push([i,j]);
        }
      }
    }

    // build corridor point-paths (orthogonal, with jitter based on windiness)
    const corridorPaths = edges.map(([i,j]) => {
      const a = rooms[i], b = rooms[j];
      const ax = Math.round(a.cx), ay = Math.round(a.cy);
      const bx = Math.round(b.cx), by = Math.round(b.cy);
      const points = [{x:ax,y:ay}];
      let cx = ax, cy = ay;
      const segs = windiness > 0 ? ri(1, 1+Math.min(3,Math.floor(windiness/2))) : 1;
      for (let s=0; s<segs; s++){
        const tx = s===segs-1 ? bx : Math.round(cx + (bx-cx) * ((s+1)/segs) + (windiness>0? ri(-windiness, windiness):0));
        const ty = s===segs-1 ? by : Math.round(cy + (by-cy) * ((s+1)/segs) + (windiness>0? ri(-windiness, windiness):0));
        if (rand() > 0.5){
          points.push({x: tx, y: cy});
          points.push({x: tx, y: ty});
        } else {
          points.push({x: cx, y: ty});
          points.push({x: tx, y: ty});
        }
        cx = tx; cy = ty;
      }
      return points;
    });

    // rasterize all corridors into a single set of occupied grid cells
    const corridorCells = new Set();
    corridorPaths.forEach(path => rasterizeCorridor(path, profile.corridorWidthCells, corridorCells));

    // room-occupied cells, used to know where corridors open into rooms
    const roomCells = new Set();
    rooms.forEach(r => {
      for (let x=r.x; x<r.x+r.w; x++){
        for (let y=r.y; y<r.y+r.h; y++) roomCells.add(x+','+y);
      }
    });

    // doors: every edge where a corridor cell meets a room cell is a
    // threshold, marked with a door symbol instead of left as a bare gap
    const doors = [];
    corridorCells.forEach(key => {
      if (roomCells.has(key)) return;
      const [cx,cy] = key.split(',').map(Number);
      if (roomCells.has(cx+','+(cy-1))) doors.push({ cx, cy, side:'top' });
      if (roomCells.has(cx+','+(cy+1))) doors.push({ cx, cy, side:'bottom' });
      if (roomCells.has((cx-1)+','+cy)) doors.push({ cx, cy, side:'left' });
      if (roomCells.has((cx+1)+','+cy)) doors.push({ cx, cy, side:'right' });
    });

    // monsters: drawn from the SRD + Monster Manual bestiary, restricted to
    // the requested CR range, placed with a chance per chamber set by
    // Monster Frequency. A chamber can hold up to 5 creatures, but the
    // combined CR of everything in the room is capped at the Maximum CR.
    // Every candidate is already >= the Minimum CR (that's what the pool
    // is filtered to), so once no pool creature fits what's left of the
    // budget, the room simply stops gaining monsters rather than reaching
    // below the CR floor just to pad out the headcount.
    const markers = [];
    const monsterPool = MONSTER_DATA.filter(m => m[1] >= crMin && m[1] <= crMax);
    const monsterRooms = new Set();
    // Frequency values are 0-9. We convert each to a per-room probability
    // such that freq=9 fills every eligible chamber and freq=0 fills none.
    // prob(f) = f/9, so prob(9)=1.0 exactly.
    const monsterProb = monsterFrequency / 9;
    if (monsterPool.length && monsterFrequency > 0){
      rooms.forEach(r => {
        if (r.role === 'entrance' || r.role === 'exit') return;
        if (rand() < monsterProb){
          const targetCount = ri(1, 5);
          const group = [];
          let totalCR = 0;
          for (let i=0; i<targetCount; i++){
            const remaining = crMax - totalCR;
            const eligible = monsterPool.filter(m => m[1] <= remaining);
            if (!eligible.length) break;
            const pick = choice(eligible);
            group.push(pick);
            totalCR += pick[1];
          }
          if (group.length){
            group.forEach((pick, i) => {
              markers.push({ type:'monster', room: r, name: pick[0], cr: pick[1], groupIndex: i, groupSize: group.length });
            });
            monsterRooms.add(r.id);
          }
        }
      });
    }

    const itemPool = MAGIC_ITEM_DATA.filter(m => m[1] >= rarityMin && m[1] <= rarityMax);
    const itemRooms = new Set();
    const itemProb = itemFrequency / 9;
    if (itemPool.length && itemFrequency > 0){
      rooms.forEach(r => {
        if (r.role === 'entrance' || r.role === 'exit') return;
        if (rand() < itemProb){
          const pick = choice(itemPool);
          markers.push({ type:'item', room: r, name: pick[0], rarity: pick[1] });
          itemRooms.add(r.id);
        }
      });
    }

    const trapPool = TRAP_DATA.filter(t => t[1] >= crMin && t[1] <= crMax);
    const trapProb = (trapFrequency || 0) / 9;
    rooms.forEach(r => {
      if (r.role === 'entrance' || r.role === 'exit') return;
      if (rand() < trapProb && trapPool.length){
        const pick = choice(trapPool);
        markers.push({ type:'trap', room: r, name: pick[0], cr: pick[1], description: pick[2] });
      }
    });

    return {
      rooms, corridorPaths, corridorCells, roomCells, doors, markers, profile,
      cols: COLS, rows: ROWS, cell, W, H, offX, offY
    };
  }

  // ---------- hand-drawn room outline ----------
  function noise2(idx, seed){
    const n = Math.sin((idx*12.9898 + seed*78.233)) * 43758.5453;
    return n - Math.floor(n);
  }
  function roomPath(ctx, x, y, w, h, seed, profile){
    const j = profile.jitter;
    function jitterPoint(px, py, idx){
      const f1 = noise2(idx, seed), f2 = noise2(idx+97.7, seed);
      return [px + (f1-0.5)*j, py + (f2-0.5)*j];
    }

    // plain rectangle, hard (sharp, unrounded) corners — only a faint
    // per-corner jitter for a hand-drawn feel, never rounded or jagged
    ctx.beginPath();
    const corners = [
      jitterPoint(x,y,1), jitterPoint(x+w,y,2), jitterPoint(x+w,y+h,3), jitterPoint(x,y+h,4)
    ];
    ctx.moveTo(corners[0][0], corners[0][1]);
    for (let i=1;i<4;i++) ctx.lineTo(corners[i][0], corners[i][1]);
    ctx.closePath();
  }

  // ---------- rendering ----------
  function render(dungeon, opts){
    const { showGrid, seedStr } = opts;
    const { cols: COLS, rows: ROWS, cell: scale, W, H, offX, offY, profile } = dungeon;

    canvas.width = W;
    canvas.height = H;

    ctx.clearRect(0,0,W,H);

    // parchment base
    ctx.fillStyle = '#ede3c8';
    ctx.fillRect(0,0,W,H);

    // mottled stains
    const stainRng = mulberry32(hashSeed('stains-'+seedStr)());
    for (let i=0;i<22;i++){
      const sx = stainRng()*W, sy = stainRng()*H;
      const r = 40 + stainRng()*120;
      const grad = ctx.createRadialGradient(sx,sy,0,sx,sy,r);
      grad.addColorStop(0, 'rgba(168,99,47,0.05)');
      grad.addColorStop(1, 'rgba(168,99,47,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
    }

    // grid (5 ft. squares)
    if (showGrid){
      ctx.strokeStyle = 'rgba(92,68,36,0.16)';
      ctx.lineWidth = 1;
      for (let c=0;c<=COLS;c++){
        ctx.beginPath();
        ctx.moveTo(offX+c*scale, offY);
        ctx.lineTo(offX+c*scale, offY+ROWS*scale);
        ctx.stroke();
      }
      for (let r=0;r<=ROWS;r++){
        ctx.beginPath();
        ctx.moveTo(offX, offY+r*scale);
        ctx.lineTo(offX+COLS*scale, offY+r*scale);
        ctx.stroke();
      }
    }

    // corridors — rendered as filled grid squares (not freeform lines) so
    // they line up exactly with the 5ft movement grid. Walls are only
    // drawn on edges that face open space; edges facing a room or another
    // corridor cell stay open as a passage.
    const corridorCells = dungeon.corridorCells;
    const roomCells = dungeon.roomCells;
    corridorCells.forEach(key => {
      if (roomCells.has(key)) return;
      const [cx,cy] = key.split(',').map(Number);
      const px = offX+cx*scale, py = offY+cy*scale;
      ctx.fillStyle = profile.corridorFill;
      ctx.fillRect(px, py, scale, scale);
    });
    // faint seams between every corridor cell (including interior ones) so
    // each square reads individually as a 5ft tile, not one fused ribbon
    ctx.strokeStyle = 'rgba(43,36,24,0.14)';
    ctx.lineWidth = 1;
    corridorCells.forEach(key => {
      if (roomCells.has(key)) return;
      const [cx,cy] = key.split(',').map(Number);
      const px = offX+cx*scale, py = offY+cy*scale;
      ctx.strokeRect(px+0.5, py+0.5, scale-1, scale-1);
    });
    corridorCells.forEach(key => {
      if (roomCells.has(key)) return;
      const [cx,cy] = key.split(',').map(Number);
      const px = offX+cx*scale, py = offY+cy*scale;
      ctx.strokeStyle = profile.wallColor;
      ctx.lineWidth = Math.max(1.5, scale*0.06);
      ctx.beginPath();
      if (!corridorCells.has(cx+','+(cy-1)) && !roomCells.has(cx+','+(cy-1))){ ctx.moveTo(px,py); ctx.lineTo(px+scale,py); }
      if (!corridorCells.has(cx+','+(cy+1)) && !roomCells.has(cx+','+(cy+1))){ ctx.moveTo(px,py+scale); ctx.lineTo(px+scale,py+scale); }
      if (!corridorCells.has((cx-1)+','+cy) && !roomCells.has((cx-1)+','+cy)){ ctx.moveTo(px,py); ctx.lineTo(px,py+scale); }
      if (!corridorCells.has((cx+1)+','+cy) && !roomCells.has((cx+1)+','+cy)){ ctx.moveTo(px+scale,py); ctx.lineTo(px+scale,py+scale); }
      ctx.stroke();
    });

    // rooms
    dungeon.rooms.forEach(r => {
      const x = offX + r.x*scale, y = offY + r.y*scale, w = r.w*scale, h = r.h*scale;

      roomPath(ctx, x, y, w, h, r.shapeSeed, profile);
      ctx.fillStyle = r.role === 'heart' ? profile.roomFillHeart : profile.roomFill;
      ctx.fill();

      roomPath(ctx, x, y, w, h, r.shapeSeed, profile);
      ctx.strokeStyle = profile.wallColor;
      ctx.lineWidth = 3;
      ctx.stroke();
      roomPath(ctx, x+2, y+2, w-4, h-4, r.shapeSeed+0.5, profile);
      ctx.strokeStyle = 'rgba(43,36,24,0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();

      if (r.role === 'entrance'){
        const iconSize = Math.max(14, Math.min(24, Math.min(w, h) * 0.38));
        const cx = x + w/2;
        const cy = y + h/2;
        ctx.save();
        ctx.font = iconSize + 'px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\u{1FA9C}', cx, cy - iconSize * 0.3);
        ctx.restore();
        ctx.fillStyle = '#7a2e1f';
        ctx.font = '700 ' + Math.max(8, Math.min(11, Math.min(w, h) * 0.14)) + 'px "Cormorant SC", serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText('ENTRANCE', cx, cy + iconSize * 0.6);
      }
      if (r.role === 'exit'){
        const iconSize = Math.max(14, Math.min(24, Math.min(w, h) * 0.38));
        const cx = x + w/2;
        const cy = y + h/2;
        ctx.save();
        ctx.font = iconSize + 'px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\u{1F573}\uFE0F', cx, cy - iconSize * 0.3);
        ctx.restore();
        ctx.fillStyle = '#2e4a7a';
        ctx.font = '700 ' + Math.max(8, Math.min(11, Math.min(w, h) * 0.14)) + 'px "Cormorant SC", serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText('EXIT', cx, cy + iconSize * 0.6);
      }
      if (r.role === 'heart'){
        ctx.save();
        ctx.strokeStyle = '#a8632f';
        ctx.lineWidth = 1.4;
        ctx.setLineDash([4,3]);
        roomPath(ctx, x+6, y+6, w-12, h-12, r.shapeSeed+1.2, profile);
        ctx.stroke();
        ctx.restore();
      }

      // chamber number, for cross-reference with the encounter roster
      ctx.fillStyle = 'rgba(43,36,24,0.55)';
      ctx.font = '600 ' + Math.max(9, Math.min(13, scale*0.32)) + 'px "Courier Prime", monospace';
      ctx.textAlign = 'left';
      ctx.fillText(String(r.number), x+5, y+13);
    });

    // doors — mark every room/corridor threshold instead of leaving a bare gap
    dungeon.doors.forEach(d => {
      let midX, midY, orientation;
      if (d.side === 'top'){ midX = offX+(d.cx+0.5)*scale; midY = offY+d.cy*scale; orientation = 'horizontal'; }
      else if (d.side === 'bottom'){ midX = offX+(d.cx+0.5)*scale; midY = offY+(d.cy+1)*scale; orientation = 'horizontal'; }
      else if (d.side === 'left'){ midX = offX+d.cx*scale; midY = offY+(d.cy+0.5)*scale; orientation = 'vertical'; }
      else { midX = offX+(d.cx+1)*scale; midY = offY+(d.cy+0.5)*scale; orientation = 'vertical'; }
      drawDoor(ctx, midX, midY, orientation, scale, profile.wallColor);
    });

    // border / deckled frame
    ctx.strokeStyle = '#2b2418';
    ctx.lineWidth = 4;
    ctx.strokeRect(10,10,W-20,H-20);
    ctx.strokeStyle = '#a8632f';
    ctx.lineWidth = 1;
    ctx.strokeRect(16,16,W-32,H-32);
  }

  // door symbol: a pair of short jamb stubs where the wall stops, plus a
  // wood-toned leaf bar across the threshold — drawn at every point a
  // corridor opens into a room, oriented to match the wall it interrupts
  function drawDoor(ctx, midX, midY, orientation, scale, wallColor){
    const halfSpan = scale/2;
    const jambLen = Math.max(3, scale*0.16);
    const leafLong = scale*0.6;
    const leafThick = Math.max(3, scale*0.13);
    const doorColor = '#7a4a26';

    ctx.save();
    ctx.strokeStyle = wallColor;
    ctx.lineWidth = Math.max(1.5, scale*0.06);
    ctx.beginPath();
    if (orientation === 'horizontal'){
      ctx.moveTo(midX-halfSpan, midY-jambLen/2); ctx.lineTo(midX-halfSpan, midY+jambLen/2);
      ctx.moveTo(midX+halfSpan, midY-jambLen/2); ctx.lineTo(midX+halfSpan, midY+jambLen/2);
    } else {
      ctx.moveTo(midX-jambLen/2, midY-halfSpan); ctx.lineTo(midX+jambLen/2, midY-halfSpan);
      ctx.moveTo(midX-jambLen/2, midY+halfSpan); ctx.lineTo(midX+jambLen/2, midY+halfSpan);
    }
    ctx.stroke();

    ctx.fillStyle = doorColor;
    ctx.strokeStyle = '#3a2412';
    ctx.lineWidth = 1;
    if (orientation === 'horizontal'){
      ctx.fillRect(midX-leafLong/2, midY-leafThick/2, leafLong, leafThick);
      ctx.strokeRect(midX-leafLong/2, midY-leafThick/2, leafLong, leafThick);
    } else {
      ctx.fillRect(midX-leafThick/2, midY-leafLong/2, leafThick, leafLong);
      ctx.strokeRect(midX-leafThick/2, midY-leafLong/2, leafThick, leafLong);
    }
    ctx.restore();
  }

  // ---------- UI wiring ----------
  const roomsRange = document.getElementById('roomsRange');
  const roomsVal = document.getElementById('roomsVal');
  const sizeRange = document.getElementById('sizeRange');
  const sizeVal = document.getElementById('sizeVal');
  const windRange = document.getElementById('windRange');
  const windVal = document.getElementById('windVal');
  const loopRange = document.getElementById('loopRange');
  const loopVal = document.getElementById('loopVal');
  const markersToggle = { checked: true }; // always show markers
  const gridToggle = { checked: true };    // always show grid
  const crMinRange = document.getElementById('crMinRange');
  const crMinVal = document.getElementById('crMinVal');
  const crMaxRange = document.getElementById('crMaxRange');
  const crMaxVal = document.getElementById('crMaxVal');
  const monsterFreqRange = document.getElementById('monsterFreqRange');
  const monsterFreqVal = document.getElementById('monsterFreqVal');
  const monstersToggle = { checked: true }; // always show monsters
  const itemsToggle = { checked: true };    // always show items
  const rarityMinRange = document.getElementById('rarityMinRange');
  const rarityMinVal = document.getElementById('rarityMinVal');
  const rarityMaxRange = document.getElementById('rarityMaxRange');
  const rarityMaxVal = document.getElementById('rarityMaxVal');
  const itemFreqRange = document.getElementById('itemFreqRange');
  const itemFreqVal = document.getElementById('itemFreqVal');
  const seedInput = document.getElementById('seedInput');
  const seedLine = document.getElementById('seedLine');
  const dungeonName = document.getElementById('dungeonName');
  const roomCountLabel = document.getElementById('roomCountLabel');
  const rosterEl = document.getElementById('roster');

  const SIZE_LABELS = {1:'Small',2:'Medium',3:'Large'};

  roomsRange.addEventListener('input', () => roomsVal.textContent = roomsRange.value);
  sizeRange.addEventListener('input', () => sizeVal.textContent = SIZE_LABELS[sizeRange.value]);
  windRange.addEventListener('input', () => windVal.textContent = windRange.value);
  loopRange.addEventListener('input', () => loopVal.textContent = loopRange.value);

  // CR sliders are index-based into CR_STEPS (the actual CRs present in the
  // bestiary), so any range the person picks is guaranteed to contain at
  // least one creature — there's no "0 monsters in range" dead zone.
  crMinRange.min = 0; crMinRange.max = CR_STEPS.length - 1;
  crMaxRange.min = 0; crMaxRange.max = CR_STEPS.length - 1;
  crMinRange.value = 0;
  crMaxRange.value = Math.max(0, CR_STEPS.indexOf(3) !== -1 ? CR_STEPS.indexOf(3) : Math.min(6, CR_STEPS.length-1));

  function updateCRLabels(){
    crMinVal.textContent = formatCR(CR_STEPS[parseInt(crMinRange.value,10)]);
    crMaxVal.textContent = formatCR(CR_STEPS[parseInt(crMaxRange.value,10)]);
  }
  crMinRange.addEventListener('input', () => {
    if (parseInt(crMinRange.value,10) > parseInt(crMaxRange.value,10)) crMaxRange.value = crMinRange.value;
    updateCRLabels();
  });
  crMaxRange.addEventListener('input', () => {
    if (parseInt(crMaxRange.value,10) < parseInt(crMinRange.value,10)) crMinRange.value = crMaxRange.value;
    updateCRLabels();
  });
  const trapFreqRange = document.getElementById('trapFreqRange');
  const trapFreqVal = document.getElementById('trapFreqVal');
  trapFreqRange.addEventListener('input', () => trapFreqVal.textContent = trapFreqRange.value);
  monsterFreqRange.addEventListener('input', () => monsterFreqVal.textContent = monsterFreqRange.value);
  updateCRLabels();

  // Rarity sliders are index-based into the fixed RARITY_STEPS tiers
  function updateRarityLabels(){
    rarityMinVal.textContent = formatRarity(parseInt(rarityMinRange.value,10));
    rarityMaxVal.textContent = formatRarity(parseInt(rarityMaxRange.value,10));
  }
  rarityMinRange.addEventListener('input', () => {
    if (parseInt(rarityMinRange.value,10) > parseInt(rarityMaxRange.value,10)) rarityMaxRange.value = rarityMinRange.value;
    updateRarityLabels();
  });
  rarityMaxRange.addEventListener('input', () => {
    if (parseInt(rarityMaxRange.value,10) < parseInt(rarityMinRange.value,10)) rarityMinRange.value = rarityMaxRange.value;
    updateRarityLabels();
  });
  itemFreqRange.addEventListener('input', () => itemFreqVal.textContent = itemFreqRange.value);
  updateRarityLabels();

  let currentDungeon = null;
  let currentSeedStr = '';

  function currentRenderOpts(){
    return {
      showGrid: gridToggle.checked,
      showMarkers: markersToggle.checked,
      showMonsters: monstersToggle.checked,
      showItems: itemsToggle.checked,
      seedStr: currentSeedStr
    };
  }

  function renderRoster(dungeon){
    const monsterMarkers = dungeon.markers.filter(m => m.type === 'monster');
    const itemMarkers = dungeon.markers.filter(m => m.type === 'item');
    const trapMarkers = dungeon.markers.filter(m => m.type === 'trap');

    const total = monsterMarkers.length + itemMarkers.length + trapMarkers.length;
    if (!total){
      rosterEl.style.display = '';
      rosterEl.innerHTML = '<div class="roster-head">Survey Findings</div>'
        + '<div class="roster-empty">Nothing placed this survey — raise a Frequency slider, or widen a CR/Rarity range, to populate these chambers.</div>';
      return;
    }

    const byRoom = new Map();
    function bucket(num){
      if (!byRoom.has(num)) byRoom.set(num, { monsters: [], item: null, trap: null });
      return byRoom.get(num);
    }
    monsterMarkers.forEach(m => bucket(m.room.number).monsters.push(m));
    itemMarkers.forEach(m => { bucket(m.room.number).item = m; });
    trapMarkers.forEach(m => { bucket(m.room.number).trap = m; });
    const roomNumbers = [...byRoom.keys()].sort((a,b) => a-b);

    const rows = roomNumbers.map(num => {
      const entry = byRoom.get(num);
      const lines = [];
      if (entry.monsters.length){
        const totalCR = entry.monsters.reduce((sum,m) => sum+m.cr, 0);
        const list = entry.monsters.map(m => `${m.name} (CR ${formatCR(m.cr)})`).join(', ');
        lines.push(`<div class="roster-line">${list} <span class="roster-sub">— Total CR ${formatCR(totalCR)}</span></div>`);
      }
      if (entry.item){
        lines.push(`<div class="roster-line">${entry.item.name} <span class="roster-sub">(${formatRarity(entry.item.rarity)})</span></div>`);
      }
      if (entry.trap){
        lines.push(`<div class="roster-line"><span class="roster-tag roster-tag-trap">Trap</span><strong>${entry.trap.name}</strong> <span class="roster-sub">CR ${formatCR(entry.trap.cr)}</span><div class="roster-desc">${entry.trap.description}</div></div>`);
      }
      return `<div class="roster-row"><span class="roster-room">Rm ${num}</span><div class="roster-name">${lines.join('')}</div></div>`;
    }).join('');

    const counts = [];
    if (monsterMarkers.length) counts.push(monsterMarkers.length + ' creature' + (monsterMarkers.length===1?'':'s'));
    if (itemMarkers.length) counts.push(itemMarkers.length + ' item' + (itemMarkers.length===1?'':'s'));
    if (trapMarkers.length) counts.push(trapMarkers.length + ' trap' + (trapMarkers.length===1?'':'s'));

    rosterEl.style.display = '';
    rosterEl.innerHTML = '<div class="roster-head">Survey Findings · ' + counts.join(', ')
      + ' across ' + roomNumbers.length + ' room' + (roomNumbers.length===1?'':'s') + '</div>'
      + '<div class="roster-list">' + rows + '</div>';
  }

  function generate(){
    const seedFieldVal = seedInput.value.trim();
    currentSeedStr = setSeed(seedFieldVal);
    seedInput.value = currentSeedStr;
    seedLine.textContent = 'seed: ' + currentSeedStr;

    const crMin = CR_STEPS[parseInt(crMinRange.value,10)];
    const crMax = CR_STEPS[parseInt(crMaxRange.value,10)];
    const rarityMin = parseInt(rarityMinRange.value,10);
    const rarityMax = parseInt(rarityMaxRange.value,10);
    const dungeon = buildDungeon({
      roomCount: parseInt(roomsRange.value,10),
      sizeTier: parseInt(sizeRange.value,10),
      windiness: parseInt(windRange.value,10),
      loopiness: parseInt(loopRange.value,10),
      crMin, crMax,
      monsterFrequency: parseInt(monsterFreqRange.value,10),
      rarityMin, rarityMax,
      itemFrequency: parseInt(itemFreqRange.value,10),
      trapFrequency: parseInt(trapFreqRange.value,10)
    });
    currentDungeon = dungeon;

    const opts = currentRenderOpts();
    render(dungeon, opts);
    renderRoster(dungeon);

    dungeonName.textContent = generateName();
    roomCountLabel.textContent = dungeon.rooms.length + ' chambers · ' + dungeon.corridorPaths.length + ' passages';
  }

  document.getElementById('generateBtn').addEventListener('click', generate);

  // re-render (without regenerating layout) when display toggles change

  document.getElementById('downloadBtn').addEventListener('click', () => {
    const link = document.createElement('a');
    const safeName = (dungeonName.textContent || 'dungeon-map').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
    link.download = safeName + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  document.getElementById('printBtn').addEventListener('click', () => {
    const dataUrl = canvas.toDataURL('image/png');
    let rosterHtml = '';
    if (currentDungeon){
      const monsterMarkers = currentDungeon.markers.filter(m => m.type === 'monster');
      const itemMarkers = currentDungeon.markers.filter(m => m.type === 'item');
      const trapMarkers = currentDungeon.markers.filter(m => m.type === 'trap');
      if (monsterMarkers.length || itemMarkers.length || trapMarkers.length){
        const byRoom = new Map();
        function bucket(num){
          if (!byRoom.has(num)) byRoom.set(num, { monsters: [], item: null, trap: null });
          return byRoom.get(num);
        }
        monsterMarkers.forEach(m => bucket(m.room.number).monsters.push(m));
        itemMarkers.forEach(m => { bucket(m.room.number).item = m; });
        trapMarkers.forEach(m => { bucket(m.room.number).trap = m; });
        const roomNumbers = [...byRoom.keys()].sort((a,b) => a-b);
        const rows = roomNumbers.map(num => {
          const entry = byRoom.get(num);
          const parts = [];
          if (entry.monsters.length){
            const totalCR = entry.monsters.reduce((sum,m) => sum+m.cr, 0);
            const list = entry.monsters.map(m => `${m.name} (CR ${formatCR(m.cr)})`).join(', ');
            parts.push(`${list} — Total CR ${formatCR(totalCR)}`);
          }
          if (entry.item){
            parts.push(`${entry.item.name} (${formatRarity(entry.item.rarity)})`);
          }
          if (entry.trap){
            parts.push(`<strong>Trap — ${entry.trap.name}</strong> (CR ${formatCR(entry.trap.cr)})<br><span style="font-size:12px;">${entry.trap.description}</span>`);
          }
          return `<tr><td style="padding:4px 14px 4px 0;vertical-align:top;">Room ${num}</td><td style="padding:4px 14px 4px 0;">${parts.join('<br>')}</td></tr>`;
        }).join('');
        rosterHtml = `<div style="margin-top:18px;font-family:Georgia,serif;max-width:700px;"><h3 style="margin-bottom:6px;">Survey Findings</h3><table style="font-size:13px;">${rows}</table></div>`;
      }
    }
    const w = window.open('', '_blank');
    w.document.write(`<html><head><title>${dungeonName.textContent}</title></head><body style="margin:0;padding:20px;display:flex;flex-direction:column;align-items:center;"><img src="${dataUrl}" style="max-width:100%;" onload="window.print();">${rosterHtml}</body></html>`);
    w.document.close();
  });


  // initial generation
  generate();
})();
</script>
</body>
</html>
